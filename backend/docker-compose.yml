version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shyndyq-net
    volumes:
      - ./models:/app/models

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shyndyq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shyndyq"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shyndyq-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - shyndyq-net

networks:
  shyndyq-net:
    driver: bridge
